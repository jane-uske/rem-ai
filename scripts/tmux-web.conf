# Web-terminal-oriented tmux defaults.

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 100000
set -g status-position top
set -g status-right ""
set -g status-left " rem-dev "
set -g status-style "bg=#111827,fg=#e5e7eb"
set -g message-style "bg=#111827,fg=#e5e7eb"
set -g mode-style "bg=#0f766e,fg=#ecfeff"

# Easier copy-mode entry for browser terminals.
bind -n F7 copy-mode
bind -n M-Up copy-mode

# Vi-style copy mode so arrows/PageUp/PageDown feel natural once inside.
setw -g mode-keys vi

# Handy shortcuts shown in terminal docs/messages.
bind-key v copy-mode
bind-key r source-file /Users/rare/Desktop/rem-ai/scripts/tmux-web.conf \; display-message "tmux config reloaded"
